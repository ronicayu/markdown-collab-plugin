name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package (smoke test)
        run: npx --yes @vscode/vsce package --no-dependencies --out markdown-collab-plugin.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: markdown-collab-plugin.vsix
          if-no-files-found: error
