name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Package only, skip marketplace publish'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Package
        run: npx --yes @vscode/vsce package --out markdown-collab-plugin.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: markdown-collab-plugin.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true && env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath markdown-collab-plugin.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true && env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish markdown-collab-plugin.vsix --pat "$OVSX_PAT"

      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section starting with "## $VERSION " (followed by space or end-of-line)
          # up to (but not including) the next "## " heading. Empty if no match —
          # the next step then falls back to --generate-notes.
          awk -v ver="$VERSION" '
            BEGIN { capture = 0 }
            /^## / {
              if (capture) exit
              if ($2 == ver) { capture = 1; next }
            }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          # Trim trailing blank lines.
          sed -e :a -e '/^$/N;/\n$/ba' -i.bak release-notes.md && rm -f release-notes.md.bak
          if [ -s release-notes.md ]; then
            echo "Release notes for $VERSION:"
            cat release-notes.md
          else
            echo "No CHANGELOG entry for $VERSION; will fall back to auto-generated notes."
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              markdown-collab-plugin.vsix \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              markdown-collab-plugin.vsix \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
