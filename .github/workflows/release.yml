name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Package only, skip marketplace publish'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Package
        run: npx --yes @vscode/vsce package --no-dependencies --out markdown-collab-plugin.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: markdown-collab-plugin.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath markdown-collab-plugin.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish markdown-collab-plugin.vsix --pat "$OVSX_PAT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            markdown-collab-plugin.vsix \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
