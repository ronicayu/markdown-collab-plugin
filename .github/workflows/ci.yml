name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      # Real package, NOT `--no-dependencies`. The release pipeline ships
      # the same artifact; CI must catch missing-runtime-dep failures
      # (e.g. y-protocols not bundled) before a tag goes out, not after.
      - name: Package (full)
        run: npx --yes @vscode/vsce package --out markdown-collab-plugin.vsix

      - name: Verify runtime deps are bundled
        run: |
          for dep in node_modules/y-protocols/awareness.js node_modules/yjs/package.json node_modules/lib0/package.json node_modules/ws/package.json node_modules/markdown-it/package.json; do
            if ! unzip -l markdown-collab-plugin.vsix | grep -q "extension/$dep"; then
              echo "::error::missing $dep in vsix — vscodeignore re-includes are out of sync with the code's requires"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: markdown-collab-plugin.vsix
          if-no-files-found: error
